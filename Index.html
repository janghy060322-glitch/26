<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>7번 출구 (Exit 7) - Seoul Station Transfer Guide</title>
  <style>
    :root {
      --bg: #f1f5fa;
      --card: #ffffff;
      --text: #252a34;
      --muted: #707784;
      --line: #dbe2ef;
      --main: #007aff;
      --main-dark: #0056b3;
      --soft: #e6f0ff;
      --soft-2: #f0f4f8;
      --green: #3a9b66;
      --red: #e85b5b;
      --yellow: #f3b13c;
      --shadow: 0 18px 45px rgba(20, 35, 80, 0.1);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .app-shell {
      width: min(430px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      background: #ffffff;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 60px rgba(12, 24, 49, 0.1);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px 10px;
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(219, 226, 239, 0.8);
    }

    .brand { display: flex; align-items: center; gap: 9px; font-weight: 800; }
    .brand-mark {
      width: 34px; height: 34px; border-radius: 12px;
      background: linear-gradient(135deg, var(--main), #6caeff);
      display: grid; place-items: center; color: white; font-weight: bold;
    }

    .lang-select {
      font-size: 13px; color: var(--main-dark); background: var(--soft);
      padding: 6px 12px; border-radius: 999px; font-weight: 700; border: none;
    }

    section { display: none; padding: 22px 18px 96px; flex: 1; }
    section.active { display: flex; flex-direction: column; }

    h1 { font-size: 30px; line-height: 1.25; margin: 0 0 8px; letter-spacing: -0.04em; }
    .lead { color: var(--muted); font-size: 15px; margin-bottom: 24px; }

    .select-card {
      background: white; border: 1px solid var(--line); border-radius: var(--radius);
      padding: 18px; box-shadow: var(--shadow); margin-bottom: 20px;
    }

    .select-group { margin-bottom: 18px; }
    .select-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; font-weight: 700; }

    .btn-option {
      width: 100%; padding: 14px 16px; background-color: #fff;
      border: 1px solid var(--line); border-radius: 14px; text-align: left;
      font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 8px;
    }
    .btn-option.selected { border-color: var(--main); background-color: var(--soft); color: var(--main-dark); }

    .primary-btn {
      width: 100%; border-radius: 18px; padding: 16px; font-size: 16px; font-weight: 850;
      color: white; background: linear-gradient(135deg, var(--main), #5cb2ff);
      box-shadow: 0 14px 28px rgba(0, 122, 255, 0.25);
    }
    .secondary-btn {
      width: 100%; border-radius: 18px; padding: 16px; font-size: 16px; font-weight: 850;
      background: #fff; color: var(--main-dark); border: 1px solid #cce0ff;
    }

    .route-banner { font-size: 13px; color: var(--main-dark); background: var(--soft); padding: 6px 12px; border-radius: 999px; display: inline-block; margin-bottom: 16px; font-weight: 800; }
    .guide-card { background: white; border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); margin-bottom: 20px; }
    .step-counter { padding: 10px; text-align: center; background: var(--text); color: white; font-weight: 800; font-size: 13px; }
    
    .image-view { width: 100%; height: 210px; background: #dfebf7; position: relative; display: flex; justify-content: center; align-items: center; }
    .guide-arrow { position: absolute; width: 44px; height: 44px; border-left: 8px solid var(--red); border-bottom: 8px solid var(--red); transform: rotate(-45deg); animation: bounce 0.8s infinite alternate; }
    @keyframes bounce { from { transform: rotate(-45deg) translate(0, 0); } to { transform: rotate(-45deg) translate(-8px, 8px); } }

    .instruction-panel { padding: 20px; }
    .instruction-text { font-size: 16px; line-height: 1.6; font-weight: 700; }
    .tip-box { margin-top: 12px; background: #fffdf5; border-left: 4px solid var(--yellow); padding: 10px; color: #665220; font-size: 13px; border-radius: 4px; }

    .nav-buttons { display: flex; gap: 10px; margin-top: auto; }
    .sos-card { background: #1e222b; color: white; border-radius: var(--radius); padding: 20px; text-align: center; margin: auto 0 20px; }
    .sos-card .big-ko { font-size: 26px; font-weight: 900; color: #fff; margin: 10px 0; }

    .bottom-nav {
      position: absolute; bottom: 0; left: 0; width: 100%; padding: 10px 14px;
      background: rgba(255, 255, 255, 0.9); border-top: 1px solid var(--line); display: none; gap: 8px;
    }
    .bottom-nav.show { display: flex; }
    .nav-mini { flex: 1; padding: 12px; border-radius: 14px; background: white; border: 1px solid var(--line); font-size: 12px; font-weight: 850; }
    .nav-mini.active { background: var(--text); color: white; }
  </style>
</head>
<body>

  <main class="app-shell">
    <header class="topbar">
      <div class="brand"><div class="brand-mark">7</div><span>7번 출구 (Exit 7)</span></div>
      <select class="lang-select" id="langSelect" onchange="changeLanguage()">
        <option value="ja">JP</option>
        <option value="en">EN</option>
        <option value="ko">KR</option>
      </select>
    </header>

    <section id="home" class="active">
      <h1 id="home-title">迷わない、<br>ソウル駅乗り換えガイド</h1>
      <p class="lead" id="home-lead">複雑なソウル駅의 환승 경로를 사진으로 쉽게 안내합니다.</p>

      <div class="select-card">
        <div class="select-group">
          <label id="lbl-start">출발지 (Departure)</label>
          <button class="btn-option selected" onclick="selectOption('start', this, 'line1')">🚉 1호선 승강장 (Line 1)</button>
          <button class="btn-option" onclick="selectOption('start', this, 'ktx')">🚄 지상 KTX 대합실 (KTX Hall)</button>
        </div>
        <div class="select-group">
          <label id="lbl-end">목적지 (Destination)</label>
          <button class="btn-option selected" onclick="selectOption('end', this, 'line4')">🚇 4호선 갈아타는 곳 (Line 4)</button>
        </div>
      </div>

      <button class="primary-btn" id="btn-start" onclick="startGuide()">안내 시작 (Start Guide)</button>
    </section>

    <section id="guide">
      <div class="route-banner" id="route-banner-text">LINE 1 ➔ LINE 4</div>
      <div class="guide-card">
        <div class="step-counter" id="step-counter-text">STEP 1 / 3</div>
        <div class="image-view">
          <div id="step-image-desc" style="font-weight:700; color:#555;">[Photo Area]</div>
          <div class="guide-arrow" id="arrow" style="top: 40%; left: 50%;"></div>
        </div>
        <div class="instruction-panel">
          <p class="instruction-text" id="step-text">내용</p>
          <div class="tip-box" id="step-tip">팁</div>
        </div>
      </div>
      <div class="nav-buttons">
        <button class="secondary-btn" id="btn-prev" onclick="prevStep()">戻る</button>
        <button class="primary-btn" id="btn-next" onclick="nextStep()">次へ</button>
      </div>
    </section>

    <section id="end">
      <h1 id="end-title" style="text-align:center; margin-top:20px;">도착했습니다!</h1>
      <div class="sos-card">
        <span style="background:var(--red); padding:4px 8px; border-radius:999px; font-size:11px; font-weight:800;">Emergency</span>
        <div class="big-ko">길을 잃었어요. 도와주세요.</div>
        <p style="font-size:12px; color:#a0aec0; margin:0;" id="sos-desc">역무원에게 보여주세요.</p>
      </div>
      <button class="primary-btn" id="btn-home" onclick="goHome()">처음으로</button>
    </section>

    <nav class="bottom-nav" id="bottomNav">
      <button class="nav-mini" onclick="goHome()">HOME</button>
      <button class="nav-mini active" onclick="startGuide()">GUIDE</button>
      <button class="nav-mini" onclick="showScreen('end')">SOS</button>
    </nav>
  </main>

  <script>
    const i18n = {
      ja: {
        homeTitle: "迷わない、<br>ソウル駅乗り換えガイド",
        homeLead: "複雑なソウル駅の乗り換えルートをステップ別写真で案内します。",
        lblStart: "今どこにいますか？ (出発地)", lblEnd: "どこへ行きますか？ (目的地)",
        btnStart: "ルート案内を始める", btnPrev: "戻る", btnNext: "次へ", btnHome: "ホームへ戻る",
        arrivalTitle: "目的地に到着しました！", sosDesc: "駅員さんにこの画面を見せてください。",
        routes: {
          "line1-line4": [
            { text: "「4号線 (Line 4)」の案内標識を探し、階段を上がってください。", tip: "💡 床にある【青い案内線】に沿って進むと簡単です。", img: "📸 [Step 1] 1号線ホーム의 안내판", arrow: true },
            { text: "通路を直進し「乗り換え改札機」にカードをタッチして通過してください。", tip: "💡 追加料金はかかりません(0円と表示されます)。", img: "📸 [Step 2] 乗り換え専用ゲート", arrow: false }
          ],
          "ktx-line4": [
            { text: "KTX大合唱エリアから地下1階の地下鉄連結通路へ下りてください。", tip: "💡 『지하철 타는 곳 (Subway)』の案内表示に従ってください。", img: "📸 [Step 1] 地下に下りるエスカレーター", arrow: true },
            { text: "地下の改札口にカードをタッチして入ります。", tip: "💡 15分以内にタッチすれば乗り換え割引が適用されます！", img: "📸 [Step 2] 地下1階의 지하철 개찰구", arrow: true }
          ]
        }
      },
      ko: {
        homeTitle: "길 잃지 마세요,<br>서울역 환승 가이드",
        homeLead: "복잡한 서울역 환승 경로를 사진 가이드로 쉽게 안내합니다.",
        lblStart: "현재 위치 (출발지)", lblEnd: "가고자 하는 곳 (목적지)",
        btnStart: "길 찾기 시작", btnPrev: "이전", btnNext: "다음", btnHome: "처음으로 돌아가기",
        arrivalTitle: "목적지에 도착했습니다!", sosDesc: "역무원에게 이 화면을 보여주세요.",
        routes: {
          "line1-line4": [
            { text: "'4호선 갈아타는 곳' 표지판을 따라 계단을 올라가세요.", tip: "💡 바닥에 그려진 [파란색 환승 띠]를 따라 걸으면 쉽습니다.", img: "📸 [Step 1] 1호선 승강장 안내판", arrow: true },
            { text: "'환승 개찰구'가 나오면 교통카드를 찍고 지나가세요.", tip: "💡 요금은 0원이 찍히며 추가 요금이 나가지 않습니다!", img: "📸 [Step 2] 환승 전용 게이트", arrow: false }
          ],
          "ktx-line4": [
            { text: "KTX 대합실(지상 2층)에서 에스컬레이터를 타고 지하 1층으로 내려가세요.", tip: "💡 '지하철 타는 곳' 안내판을 보고 내려가시면 됩니다.", img: "📸 [Step 1] 지하 연결 에스컬레이터", arrow: true },
            { text: "지하 개찰구에 카드를 한 번 더 찍고 안으로 들어갑니다.", tip: "💡 15분 이내에 찍으면 환승 할인이 유지되어 요금이 추가되지 않습니다!", img: "📸 [Step 2] 지하철 개찰구 외부", arrow: true }
          ]
        }
      }
    };

    let currentLang = 'ja'; let selectedStart = 'line1'; let selectedEnd = 'line4'; let currentStep = 0; let activeRouteData = [];

    function selectOption(type, element, value) {
      const buttons = element.parentElement.querySelectorAll('.btn-option');
      buttons.forEach(btn => btn.classList.remove('selected'));
      element.classList.add('selected');
      if(type === 'start') selectedStart = value;
      if(type === 'end') selectedEnd = value;
    }

    function changeLanguage() {
      currentLang = document.getElementById('langSelect').value;
      const dict = i18n[currentLang] || i18n['ja'];
      document.getElementById('home-title').innerHTML = dict.homeTitle;
      document.getElementById('home-lead').innerText = dict.homeLead;
      document.getElementById('lbl-start').innerText = dict.lblStart;
      document.getElementById('lbl-end').innerText = dict.lblEnd;
      document.getElementById('btn-start').innerText = dict.btnStart;
      document.getElementById('btn-prev').innerText = dict.btnPrev;
      document.getElementById('btn-next').innerText = dict.btnNext;
      document.getElementById('end-title').innerText = dict.arrivalTitle;
      document.getElementById('sos-desc').innerText = dict.sosDesc;
      document.getElementById('btn-home').innerText = dict.btnHome;
      if(activeRouteData.length > 0) updateGuidePage();
    }

    function startGuide() {
      const routeKey = `${selectedStart}-${selectedEnd}`;
      const dict = i18n[currentLang] || i18n['ja'];
      activeRouteData = dict.routes[routeKey] || dict.routes["line1-line4"];
      currentStep = 0;
      showScreen('guide');
      updateGuidePage();
    }

    function updateGuidePage() {
      const stepData = activeRouteData[currentStep];
      document.getElementById('route-banner-text').innerText = `${selectedStart.toUpperCase()} ➔ ${selectedEnd.toUpperCase()}`;
      document.getElementById('step-counter-text').innerText = `STEP ${currentStep + 1} / ${activeRouteData.length}`;
      document.getElementById('step-image-desc').innerText = stepData.img;
      document.getElementById('step-text').innerText = stepData.text;
      document.getElementById('step-tip').innerText = stepData.tip;
      document.getElementById('arrow').style.display = stepData.arrow ? 'block' : 'none';
      document.getElementById('btn-prev').style.visibility = (currentStep === 0) ? 'hidden' : 'visible';
    }

    function nextStep() {
      if (currentStep < activeRouteData.length - 1) { currentStep++; updateGuidePage(); } else { showScreen('end'); }
    }
    function prevStep() { if (currentStep > 0) { currentStep--; updateGuidePage(); } }
    function goHome() { activeRouteData = []; showScreen('home'); }

    function showScreen(id) {
      ["home", "guide", "end"].forEach(s => document.getElementById(s).classList.toggle("active", s === id));
      const nav = document.getElementById("bottomNav");
      nav.classList.toggle("show", id !== "home");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    changeLanguage();
  </script>
</body>
</html>
